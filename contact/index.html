<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBAlpha — Contact</title>
<meta name="description" content="contact ORBAlpha — questions, support, and launch notifications.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320'%3E%3Cg stroke='%23DADCE0' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12,50 L12,12 L50,12'/%3E%3Cpath d='M270,12 L308,12 L308,50'/%3E%3Cpath d='M12,270 L12,308 L50,308'/%3E%3Cpath d='M270,308 L308,308 L308,270'/%3E%3C/g%3E%3Ccircle cx='160' cy='160' r='100' fill='none' stroke='%23202124' stroke-width='24'/%3E%3Ctext x='172' y='228' font-family='Georgia,serif' font-style='italic' font-size='108' fill='%231A73E8'%3E%CE%B1%3C/text%3E%3C/svg%3E">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', Courier, monospace;
  background: #ECEEF1; color: #202124;
  min-height: 100vh; display: flex; flex-direction: column;
}
.system-bar {
  background: #D3E3FD; display: flex; justify-content: space-between;
  align-items: center; padding: 14px 32px;
}
.system-bar-left { display: flex; align-items: center; gap: 12px; }
.logo-mark { width: 36px; height: 36px; flex-shrink: 0; }
.system-id { font-weight: bold; font-size: 15px; color: #202124; }
.system-sub { font-size: 12px; color: #5F6368; }
.back-link { font-size: 12px; color: #1A73E8; text-decoration: none; }
main {
  flex: 1; max-width: 800px; width: 100%; margin: 0 auto; padding: 40px 32px;
}
.section-heading {
  font-size: 22px; font-weight: bold; color: #202124; margin-bottom: 16px;
}
.section-heading.small { font-size: 16px; margin-top: 32px; }
.body-text {
  font-size: 14px; color: #202124; line-height: 1.7; margin-bottom: 16px;
}
.contact-form {
  margin-top: 8px;
}
.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: 13px;
  color: #5F6368;
  margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px;
  color: #202124;
  background: #fff;
  border: 1px solid #DADCE0;
  padding: 10px 12px;
  outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: #1A73E8;
}
.form-group textarea {
  min-height: 120px;
  resize: vertical;
}
.form-group select {
  cursor: pointer;
}
.submit-btn {
  font-family: 'Courier New', Courier, monospace;
  font-size: 14px;
  color: #fff;
  background: #1A73E8;
  border: none;
  padding: 10px 24px;
  cursor: pointer;
}
.submit-btn:hover {
  background: #1557b0;
}
footer {
  background: #D3E3FD; padding: 14px 32px; font-size: 12px; color: #202124;
}
.footer-row { display: flex; justify-content: space-between; align-items: center; }
.footer-links { margin-top: 8px; }
.footer-links a { font-size: 13px; color: #1A73E8; text-decoration: none; }
footer .auth { color: #5F6368; }
@media (max-width: 600px) {
  .system-bar { flex-direction: column; align-items: flex-start; gap: 4px; padding: 12px 16px; }
  main { padding: 32px 16px; }
  footer { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="system-bar">
  <div class="system-bar-left">
    <svg class="logo-mark" viewBox="36 36 260 260" xmlns="http://www.w3.org/2000/svg"><g stroke="#5F6368" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"><path d="M12,50 L12,12 L50,12"/><path d="M270,12 L308,12 L308,50"/><path d="M12,270 L12,308 L50,308"/><path d="M270,308 L308,308 L308,270"/></g><g stroke="#5F6368" stroke-width="1.5" stroke-linecap="round" opacity="0.25"><line x1="160" y1="67" x2="160" y2="253"/><line x1="72" y1="160" x2="248" y2="160"/></g><line x1="160" y1="44" x2="160" y2="28" stroke="#5F6368" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="160" y1="276" x2="160" y2="292" stroke="#5F6368" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><line x1="44" y1="160" x2="28" y2="160" stroke="#5F6368" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/><circle cx="160" cy="26" r="3" fill="#1A73E8"/><circle cx="160" cy="294" r="3" fill="#1A73E8"/><circle cx="26" cy="160" r="3" fill="#1A73E8"/><circle cx="160" cy="160" r="100" fill="none" stroke="#202124" stroke-width="24"/><text x="172" y="228" font-family="Georgia,'Times New Roman',serif" font-style="italic" font-size="108" fill="#1A73E8">&#945;</text></svg>
    <div>
      <div class="system-id">ORBAlpha SYSTEM</div>
      <div class="system-sub">contact</div>
    </div>
  </div>
  <a href="/" class="back-link">&larr; back</a>
</div>

<main>

  <div class="section-heading">// CONTACT</div>

  <p class="body-text">questions, support requests, or launch notifications &mdash; use the form
below. we read everything.</p>

  <div class="section-heading small">// REASON</div>

  <!--
    FORMSPREE SETUP (one-time):
    1. Sign up free at https://formspree.io
    2. Create a new form, set the recipient to your email
    3. Copy the form endpoint (looks like: https://formspree.io/f/xABCDEFG)
    4. Replace the action URL below with your endpoint
  -->
  <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="reason">what's this about?</label>
      <select id="reason" name="reason" required>
        <option value="" disabled selected>select a reason</option>
        <option value="general">general question</option>
        <option value="support">support / troubleshooting</option>
        <option value="notify-pro">notify me when Pro launches</option>
        <option value="notify-optimizer">notify me when the Optimizer launches</option>
        <option value="legal">legal / disclosure question</option>
        <option value="other">other</option>
      </select>
    </div>

    <div class="form-group">
      <label for="email">your email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label for="message">message</label>
      <textarea id="message" name="message" required placeholder="what can we help with?"></textarea>
    </div>

    <!-- honeypot spam filter -->
    <input type="text" name="_gotcha" style="display:none">

    <button type="submit" class="submit-btn">send &rarr;</button>
  </form>

</main>

<footer>
  <div class="footer-row">
    <span>&copy; 2026 ORBAlpha.com</span>
    <span class="auth">authorized access only</span>
  </div>
  <div class="footer-links"><a href="/legal/">/legal</a></div>
</footer>

</body>
</html>
